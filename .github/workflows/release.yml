name: Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading 'v')"
        required: true

permissions:
  contents: write   # needed for softprops/action-gh-release

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            target: aarch64-unknown-linux-gnu
          # x86_64-apple-darwin temporarily disabled: GitHub is deprecating
          # macos-13 runners and jobs queue 24h+ before timing out. Restore
          # this row once a macos-* Intel runner is reliably available again.
          - os: macos-14
            target: aarch64-apple-darwin
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Load baseline floors
        shell: bash
        run: |
          set -a
          source .github/baseline.env
          set +a
          {
            echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          } >>"$GITHUB_ENV"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in x86_64) PA="linux-x86_64" ;; aarch64) PA="linux-aarch_64" ;; esac
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v25.3/protoc-25.3-${PA}.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*' && rm /tmp/protoc.zip
      - name: Install Clang 20 (Linux)
        if: runner.os == 'Linux'
        run: |
            manylinux-install-clang -v 20.1.8.0
      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >>"$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"
          fi
      - name: Configure + build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - name: Install to staging prefix
        run: cmake --install build --prefix stage
      - name: Tar
        id: pack
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          TARGET=${{ matrix.target }}
          ARCHIVE="lance-c-v${VERSION}-${TARGET}.tar.xz"
          tar -C stage -cJf "${ARCHIVE}" .
          if command -v shasum > /dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
            shasum -a 512 "${ARCHIVE}" > "${ARCHIVE}.sha512"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
            sha512sum "${ARCHIVE}" > "${ARCHIVE}.sha512"
          fi
          echo "archive=${ARCHIVE}" >>"$GITHUB_OUTPUT"
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.pack.outputs.archive }}
            ${{ steps.pack.outputs.archive }}.sha256
            ${{ steps.pack.outputs.archive }}.sha512
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Aggregate SHA512SUMS
        run: |
          cd dist
          cat *.sha512 > SHA512SUMS
          ls -lah
      - name: Emit recipe-update snippet
        run: |
          cd dist
          echo "## Suggested recipe updates" > recipe-snippets.md
          echo '```cmake' >> recipe-snippets.md
          echo '# ports/lance-c/portfile.cmake — paste these set() lines' >> recipe-snippets.md
          for f in *.tar.xz; do
            sha=$(awk '{print $1}' "${f}.sha512")
            triple_target="${f#lance-c-v*-}"
            triple_target="${triple_target%.tar.xz}"
            echo "set(LANCE_C_SHA512_${triple_target}  \"${sha}\")"
          done >> recipe-snippets.md
          echo '```' >> recipe-snippets.md
          cat recipe-snippets.md
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.xz
            dist/*.sha256
            dist/*.sha512
            dist/SHA512SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
