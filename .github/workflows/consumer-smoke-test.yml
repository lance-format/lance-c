name: Consumer smoke test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    # Only fire on PRs that could affect the install layout / consumer-facing
    # build. Pure src/*.rs changes are covered by the regular Tests jobs.
    paths:
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'examples/cmake-consumer/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/consumer-smoke-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  consumer-smoke-test:
    name: find_package(LanceC) smoke test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os_label: linux
          - runner: macos-14
            os_label: macos
    env:
      CC: clang
      CXX: clang++
      MACOSX_DEPLOYMENT_TARGET: "11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf-compiler (Linux)
        if: matrix.os_label == 'linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Setup Zig Toolchain (Linux Only)
        if: matrix.os_label == 'linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install protobuf (macOS)
        if: matrix.os_label == 'macos'
        run: brew install protobuf
      - name: Configure CMake
        shell: bash
        run: |
          CMAKE_FLAGS=(
            "-DCMAKE_BUILD_TYPE=Release"
          )

          if [ "${{ matrix.os_label }}" = "linux" ]; then
            case "${{ matrix.target }}" in
              x86_64-unknown-linux-gnu)
                ZIG_TARGET="x86_64-linux-gnu.2.28"
                ;;
              aarch64-unknown-linux-gnu)
                ZIG_TARGET="aarch64-linux-gnu.2.28"
                ;;
              *)
                echo "::error::Unsupported Linux target: ${{ matrix.target }}"
                exit 1
                ;;
            esac
            CMAKE_FLAGS+=(
              "-DCMAKE_C_COMPILER=zig;cc;-target;${ZIG_TARGET}"
              "-DCMAKE_CXX_COMPILER=zig;c++;-target;${ZIG_TARGET}"
            )
          fi

          mkdir build
          cmake -S . -B build "${CMAKE_FLAGS[@]}"
      - name: build + install lance-c
        run: |
          cmake --build build
          cmake --install build --prefix "$PWD/_install"
      - name: Build consumer example against the install
        run: |
          cmake -S examples/cmake-consumer -B consumer-build \
            -DCMAKE_PREFIX_PATH="$PWD/_install" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build consumer-build
      - name: Verify the binary links and runs (no dataset → expect usage error)
        run: |
          set +e
          consumer-build/consumer
          rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "Expected exit code 2 (usage error), got $rc"
            exit 1
          fi
