name: Consumer smoke test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    # Only fire on PRs that could affect the install layout / consumer-facing
    # build. Pure src/*.rs changes are covered by the regular Tests jobs.
    paths:
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'examples/cmake-consumer/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/consumer-smoke-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  consumer-smoke-test:
    name: find_package(LanceC) smoke test
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
          - os: macos-14
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Load baseline floors
        shell: bash
        run: |
          set -a
          source .github/baseline.env
          set +a
          {
            echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          } >>"$GITHUB_ENV"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf-compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in x86_64) PA="linux-x86_64" ;; aarch64) PA="linux-aarch_64" ;; esac
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v25.3/protoc-25.3-${PA}.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*' && rm /tmp/protoc.zip
      - name: Install Clang 20 (Linux)
        if: runner.os == 'Linux'
        run: |
            manylinux-install-clang -v 20.1.8.0
      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Configure + build + install lance-c
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build --prefix "$PWD/_install"
      - name: Build consumer example against the install
        run: |
          cmake -S examples/cmake-consumer -B consumer-build \
            -DCMAKE_PREFIX_PATH="$PWD/_install" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build consumer-build
      - name: Verify the binary links and runs (no dataset → expect usage error)
        run: |
          set +e
          consumer-build/consumer
          rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "Expected exit code 2 (usage error), got $rc"
            exit 1
          fi
