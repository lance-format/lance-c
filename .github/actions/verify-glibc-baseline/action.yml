name: Verify GLIBC baseline
description: Check a built Linux shared library for symbols newer than the configured baseline
inputs:
  search_root:
    description: Directory to search for the shared library
    required: false
    default: stage
  library_name:
    description: Shared library filename to verify
    required: false
    default: liblance_c.so
  workflow_type:
    description: Workflow type
    required: false
    default: dev
runs:
  using: composite
  steps:
    - name: Verify GLIBC baseline
      shell: bash
      run: |
        search_root="${{ inputs.search_root }}"
        library_name="${{ inputs.library_name }}"
        baseline="${GLIBC_BASELINE:?Baseline env not loaded}"

        target_so=$(find "$search_root" -type f -name "$library_name" -print -quit)
        if [ -z "$target_so" ]; then
          echo "::error::No shared library (${library_name}) found under ${search_root}!"
          exit 1
        fi

        echo "Verifying file: $target_so"

        objdump_output=$(objdump -T "$target_so")

        version_gt() {
          [ "$1" = "$2" ] && return 1
          [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n1)" = "$1" ]
        }

        violating_symbols=$(printf '%s\n' "$objdump_output" | grep -E 'GLIBC_[0-9]' | \
          awk '{for(i=1;i<=NF;i++) if($i~/GLIBC_[0-9]/) print $i, $(NF)}' | \
          while read -r ver sym; do
            v=$(echo "$ver" | grep -oE '[0-9]+(\.[0-9]+)+')
            if version_gt "$v" "$baseline"; then echo "$sym $ver"; fi
          done | sort -u)

        if [ -n "$violating_symbols" ]; then
          {
            echo "## GLIBC baseline violation"
            echo "One or more symbols in \`$target_so\` exceed the **$GLIBC_BASELINE** floor."
            echo ""
            echo "### Offending symbols"
            echo "\`\`\`"
            echo "$violating_symbols"
            echo "\`\`\`"
            if [ "${{ inputs.workflow_type }}" = "release" ]; then
              echo "To override in an emergency, re-dispatch with \`skip_glibc_check=true\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=GLIBC baseline violated::See job summary for details."
          exit 1
        fi
